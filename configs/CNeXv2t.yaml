experiment_name: "ConvNeXtv2_t"
seed: 42

data:
  train_dir: "data/train"
  val_dir: "data/val"
  image_size: 384
  batch_size: 16
  num_workers: 2
  pin_memory: true
  weighted_sampling: false
  max_weight: 5
  
model:
  backbone: "convnextv2_tiny.fcmae_ft_in22k_in1k_384" # e.g. "tf_efficientnetv2_s"  "convnextv2_tiny.fcmae_ft_in22k_in1k_384"  eva02_base_patch14_224 
  pretrained: true
  freeze_backbone: false
  freeze_bn: true
  num_classes: null # Inferred automatically from dataset
  dropout: 0.2
  drop_path: 0.2

loss:
  name: "ce" # "focal" or "ce"
  gamma: 2.0
  alpha: 0.25
  label_smoothing: 0.1

optimizer:
  name: "adamw"
  backbone_lr: 3e-5 #dont matter if layer_decay 
  head_lr: 3e-4 
  weight_decay: 0.05
  layer_decay: 0.9
  
scheduler:
  name: "cosine_warmup" # "cosine", "step", "plateau"
  warmup_epochs: 2
  min_lr: 1e-6

training:
  epochs: 10
  gradient_accumulation_steps: 4
  mixed_precision: true
  clip_grad_norm: 1.0
  early_stopping_patience: 5
  ema:
    enabled: true
    decay: 0.999
    eval_mode: "current" # "current" or "ema"
  
augmentation:
  mixup_alpha: 0.8
  cutmix_alpha: 1.0
  prob: 0.5 # Probability applied per batch

logging:
  use_wandb: true
  project_name: "plant-disease-classification"
  checkpoint_dir: "./checkpoints"
